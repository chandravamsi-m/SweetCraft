<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SweetCraft Bakery</title>
    
    <!-- Tailwind CSS (CDN) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased min-h-screen bg-bg flex lg:h-screen lg:overflow-hidden">

    <!-- Left: Image -->
    <div class="hidden lg:block lg:w-1/2 relative overflow-hidden h-full">
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent z-10"></div>
        <img src="../assets/images/chocolate_drip_cake.png" alt="Cakes" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 z-20 flex flex-col justify-end p-12 text-white">
            <h2 class="text-4xl font-heading font-bold mb-3 text-[#fffdf9]">Welcome Back</h2>
            <p class="text-sm text-[#fbf9f5]/90 max-w-sm font-light leading-relaxed">Log in to track your current orders, review past designs, and easily reorder your favorites.</p>
        </div>
    </div>

    <!-- Right: Form -->
    <div class="w-full lg:w-1/2 flex flex-col justify-between p-5 sm:p-8 relative min-h-screen lg:min-h-0 lg:h-full lg:overflow-y-auto no-scrollbar">
        <!-- Top bar with Logo & Toggles -->
        <div class="flex items-center justify-between w-full mb-6 shrink-0">
            <!-- Logo -->
            <a href="../index.html" class="flex items-center gap-1.5 group">
                <div class="relative w-9 h-9 flex items-center justify-center bg-secondary bg-opacity-50 rounded-lg p-1 group-hover:bg-secondary transition-all duration-300">
                    <img src="../assets/images/logo.svg" alt="SweetCraft Logo" class="w-full h-full object-contain">
                </div>
                <span class="text-xl font-heading font-bold tracking-tight text-primary">
                    Sweet<span class="text-accent font-medium italic">Craft</span>
                </span>
            </a>
            <!-- Toggles -->
            <div class="flex items-center gap-2">
                <button class="rtl-toggle px-3 py-1.5 rounded-lg bg-secondary bg-opacity-40 text-primary hover:bg-secondary transition-all duration-300 text-xs font-bold shadow-sm" aria-label="Toggle Layout Direction">
                    <span class="rtl-only">RTL</span>
                    <span class="ltr-only">LTR</span>
                </button>
                <button class="theme-toggle w-8.5 h-8.5 rounded-lg bg-secondary bg-opacity-40 text-primary hover:bg-secondary transition-all duration-300 flex items-center justify-center shadow-sm" aria-label="Toggle Dark Mode">
                    <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                    <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
                </button>
            </div>
        </div>

        <!-- Main Form Wrapper -->
        <div class="w-full max-w-md mx-auto my-auto space-y-5">
            <div class="text-center sm:text-left mb-4">
                <h2 class="text-2xl sm:text-3xl font-heading font-bold text-primary mb-1">Welcome Back</h2>
                <p class="text-xs sm:text-sm text-text opacity-70 font-light">Please enter your details to sign in.</p>
            </div>
            
            <form action="user-dashboard.html" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-text/80 uppercase tracking-wider mb-1.5">Email Address</label>
                    <input type="email" required class="w-full px-5 py-3 rounded-2xl border border-border bg-[#fffdf9] dark:bg-[#1a1612] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-all duration-300 text-text shadow-sm" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-text/80 uppercase tracking-wider mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full pl-5 pr-12 rtl:pr-5 rtl:pl-12 py-3 rounded-2xl border border-border bg-[#fffdf9] dark:bg-[#1a1612] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-all duration-300 text-text shadow-sm" placeholder="••••••••">
                        <button type="button" class="absolute right-4 rtl:left-4 rtl:right-auto top-1/2 -translate-y-1/2 text-text opacity-50 hover:opacity-85 transition-opacity" onclick="togglePasswordVisibility('password')">
                            <i data-lucide="eye" class="w-4.5 h-4.5" id="password-eye-icon"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="rounded border-border text-primary focus:ring-primary h-4 w-4 bg-[#fffdf9] dark:bg-[#1a1612] cursor-pointer">
                        <label for="remember" class="ml-2 text-sm opacity-90 font-medium cursor-pointer">Remember me</label>
                    </div>
                    <a href="#" class="text-xs text-primary hover:text-accent font-bold transition-colors">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary py-3 px-6 text-sm hover:scale-102 transition-all duration-300 w-full font-bold">Sign In &rarr;</button>
            </form>

            <div class="text-center text-sm opacity-90 font-medium pt-1">
                <p>Don't have an account? <a href="signup.html" class="text-primary font-bold hover:text-accent transition-colors">Sign up</a></p>
            </div>

            <!-- Social Logins -->
            <div class="space-y-3 pt-1">
                <div class="relative flex py-1 items-center">
                    <div class="flex-grow border-t border-border"></div>
                    <span class="flex-shrink mx-3 text-[10px] text-text opacity-50 uppercase tracking-wider font-bold">Or continue with</span>
                    <div class="flex-grow border-t border-border"></div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button type="button" class="flex items-center justify-center py-2.5 px-4 rounded-xl border border-border bg-[#fffdf9] dark:bg-[#1a1612] hover:bg-secondary/10 dark:hover:bg-secondary/5 transition-colors shadow-sm" aria-label="Sign in with Google">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button type="button" class="flex items-center justify-center py-2.5 px-4 rounded-xl border border-border bg-[#fffdf9] dark:bg-[#1a1612] hover:bg-secondary/10 dark:hover:bg-secondary/5 transition-colors shadow-sm" aria-label="Sign in with Facebook">
                        <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </button>
                    <button type="button" class="flex items-center justify-center py-2.5 px-4 rounded-xl border border-border bg-[#fffdf9] dark:bg-[#1a1612] hover:bg-secondary/10 dark:hover:bg-secondary/5 transition-colors shadow-sm text-text" aria-label="Sign in with Apple">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.5-.64.73-1.2 1.87-1.05 2.98 1.11.09 2.24-.55 3-1.42z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom bar -->
        <div class="w-full text-center text-xs opacity-50 mt-6 shrink-0">
            <p>&copy; 2026 SweetCraft Bakery. All rights reserved.</p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
