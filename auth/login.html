<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SweetCraft Bakery</title>
    
    
    
    

    <!-- Tailwind CSS (CDN) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body class="antialiased min-h-screen bg-bg flex">

    <!-- Left: Image -->
    <div class="hidden lg:block lg:w-1/2 relative overflow-hidden">
        <div class="absolute inset-0 bg-primary/20 z-10 mix-blend-multiply"></div>
        <img src="../assets/images/chocolate_drip_cake.png" alt="Cakes" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 z-20 flex flex-col justify-between p-12 text-white">
            <a href="../index.html" class="text-3xl font-heading font-bold tracking-tight">SweetCraft</a>
            <div>
                <h2 class="text-5xl font-heading font-bold mb-4">Welcome Back</h2>
                <p class="text-lg opacity-90 max-w-md">Log in to track your current orders, review past designs, and easily reorder your favorites.</p>
            </div>
        </div>
    </div>

    <!-- Right: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12">
        <div class="w-full max-w-md">
            <!-- Mobile Header -->
            <div class="lg:hidden text-center mb-8">
                <a href="../index.html" class="text-3xl font-heading font-bold text-primary tracking-tight">SweetCraft</a>
                <h2 class="text-2xl font-bold mt-4">Welcome Back</h2>
            </div>
            
            <form action="../pages/user-dashboard.html" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2 opacity-90">Email Address</label>
                    <input type="email" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="you@example.com">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium opacity-90">Password</label>
                        <a href="#" class="text-xs text-primary hover:text-accent transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="••••••••">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="rounded border-border text-primary focus:ring-primary h-4 w-4">
                    <label for="remember" class="ml-2 text-sm opacity-90">Remember me</label>
                </div>
                <button type="submit" class="btn-primary py-2 px-5 text-sm hover:scale-105 transition-all duration-300 w-full">Sign In</button>
            </form>

            <div class="mt-8 text-center text-sm opacity-90">
                <p>Don't have an account? <a href="signup.html" class="text-primary font-bold hover:text-accent transition-colors">Sign up</a></p>
            </div>
            
            <div class="mt-12 text-center text-xs opacity-50">
                <p><a href="../pages/admin-dashboard.html" class="hover:underline">Login as Admin (Demo)</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
