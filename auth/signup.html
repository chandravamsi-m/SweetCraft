<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SweetCraft Bakery</title>
    
    
    
    

    <!-- Tailwind CSS (CDN) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body class="antialiased min-h-screen bg-bg flex flex-row-reverse">

    <!-- Right: Image -->
    <div class="hidden lg:block lg:w-1/2 relative overflow-hidden">
        <div class="absolute inset-0 bg-accent/20 z-10 mix-blend-multiply"></div>
        <img src="../assets/images/bakery_hero.png" alt="Pastries" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 z-20 flex flex-col justify-between p-12 text-white">
            <div class="text-right">
                <a href="../index.html" class="text-3xl font-heading font-bold tracking-tight">SweetCraft</a>
            </div>
            <div class="text-right ml-auto">
                <h2 class="text-5xl font-heading font-bold mb-4">Join the Family</h2>
                <p class="text-lg opacity-90 max-w-md ml-auto">Create an account to start designing your custom cake, save your favorite flavors, and manage your special dates.</p>
            </div>
        </div>
    </div>

    <!-- Left: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12">
        <div class="w-full max-w-md">
            <!-- Mobile Header -->
            <div class="lg:hidden text-center mb-8">
                <a href="../index.html" class="text-3xl font-heading font-bold text-primary tracking-tight">SweetCraft</a>
                <h2 class="text-2xl font-bold mt-4">Create an Account</h2>
            </div>
            
            <form action="../pages/user-dashboard.html" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2 opacity-90">First Name</label>
                        <input type="text" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="Jane">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 opacity-90">Last Name</label>
                        <input type="text" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 opacity-90">Email Address</label>
                    <input type="email" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 opacity-90">Password</label>
                    <input type="password" required class="w-full px-4 py-3 rounded-xl border border-border bg-transparent focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="••••••••">
                </div>
                <div class="flex items-start">
                    <input type="checkbox" id="terms" required class="rounded border-border text-primary focus:ring-primary h-4 w-4 mt-1">
                    <label for="terms" class="ml-2 text-sm opacity-90 leading-tight">I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>.</label>
                </div>
                <button type="submit" class="btn-primary py-2 px-5 text-sm hover:scale-105 transition-all duration-300 w-full">Create Account</button>
            </form>

            <div class="mt-8 text-center text-sm opacity-90">
                <p>Already have an account? <a href="login.html" class="text-primary font-bold hover:text-accent transition-colors">Log in</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
