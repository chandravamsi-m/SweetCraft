<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Premium Golden/Caramel Gradient -->
    <linearGradient id="logo-caramel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5BA82" />
      <stop offset="60%" stop-color="#b5834a" />
      <stop offset="100%" stop-color="#8c5b23" />
    </linearGradient>
    <!-- Soft Terracotta/Rose Gradient -->
    <linearGradient id="logo-terracotta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F29C79" />
      <stop offset="100%" stop-color="#e07b54" />
    </linearGradient>
    <!-- Elegant Frosting Gradient -->
    <linearGradient id="logo-frosting" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDF8F2" />
    </linearGradient>
  </defs>

  <!-- Elegant Circular Crest -->
  <circle cx="50" cy="50" r="46" stroke="url(#logo-caramel)" stroke-width="2" stroke-dasharray="1 3" opacity="0.6"/>
  <circle cx="50" cy="50" r="42" stroke="url(#logo-caramel)" stroke-width="1.5" />
  
  <!-- Pedestal Cake Stand -->
  <!-- Base -->
  <path d="M35 78 C 35 78, 40 84, 50 84 C 60 84, 65 78, 65 78 Z" fill="url(#logo-caramel)" />
  <!-- Pillar -->
  <path d="M47 68 L 53 68 L 54 78 L 46 78 Z" fill="url(#logo-caramel)" />
  <!-- Plate -->
  <rect x="28" y="66" width="44" height="3" rx="1.5" fill="url(#logo-caramel)" />

  <!-- Bottom Cake Tier -->
  <path d="M32 50 C32 47, 34 46, 37 46 H63 C66 46, 68 47, 68 50 V64 C68 65.1, 67.1 66, 66 66 H34 C32.9 66, 32 65.1, 32 64 Z" fill="url(#logo-frosting)" stroke="url(#logo-caramel)" stroke-width="1.5" />
  <!-- Drip / Swirl Details on Bottom Tier -->
  <path d="M32 52 Q 41 57, 50 52 Q 59 57, 68 52" fill="none" stroke="url(#logo-terracotta)" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="41" cy="58" r="1.5" fill="#e07b54" />
  <circle cx="50" cy="58" r="1.5" fill="#e07b54" />
  <circle cx="59" cy="58" r="1.5" fill="#e07b54" />

  <!-- Top Cake Tier -->
  <path d="M37 32 C37 30, 39 29, 41 29 H59 C61 29, 63 30, 63 32 V44 C63 45.1, 62.1 46, 61 46 H39 C37.9 46, 37 45.1, 37 44 Z" fill="url(#logo-frosting)" stroke="url(#logo-caramel)" stroke-width="1.5" />
  <!-- Drip / Swirl Details on Top Tier -->
  <path d="M37 34 Q 43.5 38, 50 34 Q 56.5 38, 63 34" fill="none" stroke="url(#logo-terracotta)" stroke-width="1.2" stroke-linecap="round" />
  <circle cx="43.5" cy="39" r="1" fill="#e07b54" />
  <circle cx="56.5" cy="39" r="1" fill="#e07b54" />

  <!-- Elegant Frosting Swirls on Top -->
  <path d="M42 29 C42 27, 44 26, 46 26 C48 26, 48 27, 50 27 C52 27, 52 26, 54 26 C56 26, 58 27, 58 29" stroke="url(#logo-caramel)" stroke-width="1.5" fill="none" stroke-linecap="round" />

  <!-- Cherry Top Accent -->
  <circle cx="50" cy="21" r="3.5" fill="url(#logo-terracotta)" />
  <path d="M50 18.5 Q 52 13, 57 11.5" fill="none" stroke="url(#logo-caramel)" stroke-width="1.2" stroke-linecap="round" />

  <!-- Decorative Stars for Premium Craft Feel -->
  <path d="M22 36 L 23.5 38 L 25.5 38 L 24 39.5 L 24.5 41.5 L 23 40 L 21.5 41.5 L 22 39.5 L 20.5 38 L 22.5 38 Z" fill="url(#logo-caramel)" />
  <path d="M76 30 L 77.5 32 L 79.5 32 L 78 33.5 L 78.5 35.5 L 77 34 L 75.5 35.5 L 76 33.5 L 74.5 32 L 76.5 32 Z" fill="url(#logo-terracotta)" />
</svg>
